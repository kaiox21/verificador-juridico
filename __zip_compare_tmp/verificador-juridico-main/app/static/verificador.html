<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Painel de Verificacao Juridica</title>
  <style>
    :root {
      --bg: #f4efe5;
      --panel: #fff9f2;
      --text: #1d1f22;
      --muted: #5f6672;
      --brand: #005f73;
      --brand-2: #0a9396;
      --warn: #ca6702;
      --danger: #bb3e03;
      --ok: #2a9d8f;
      --radius: 16px;
      --shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "Trebuchet MS", Tahoma, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 15%, #e9d8a6 0 20%, transparent 21%),
        radial-gradient(circle at 95% 80%, #94d2bd 0 18%, transparent 19%),
        linear-gradient(145deg, #f7f2ea, #f1efe8 40%, #edf4f3);
      min-height: 100vh;
      padding: 28px 16px;
    }

    .wrap {
      max-width: 980px;
      margin: 0 auto;
      display: grid;
      gap: 18px;
    }

    .hero {
      background: linear-gradient(130deg, var(--brand), var(--brand-2));
      color: #f7fdfd;
      border-radius: var(--radius);
      padding: 22px;
      box-shadow: var(--shadow);
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(1.4rem, 2.8vw, 2rem);
      letter-spacing: 0.2px;
    }

    .hero p {
      margin: 8px 0 0;
      color: rgba(245, 253, 253, 0.9);
      line-height: 1.4;
    }

    .card {
      background: var(--panel);
      border: 1px solid #e6dccc;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .grid { display: grid; gap: 14px; }

    label {
      display: block;
      font-size: 0.84rem;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 700;
    }

    input, textarea, button { font: inherit; }

    input, textarea {
      width: 100%;
      border: 1px solid #d6c8b2;
      border-radius: 12px;
      background: #fff;
      padding: 12px 14px;
      color: var(--text);
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: var(--brand-2);
      box-shadow: 0 0 0 4px rgba(10, 147, 150, 0.14);
    }

    textarea { min-height: 130px; resize: vertical; }

    .actions { display: flex; gap: 10px; flex-wrap: wrap; }

    button {
      border: 0;
      border-radius: 12px;
      padding: 11px 16px;
      cursor: pointer;
      font-weight: 700;
      transition: transform 0.12s ease, filter 0.12s ease;
    }

    .btn-primary {
      background: linear-gradient(120deg, #0a9396, #005f73);
      color: #f6ffff;
    }

    .btn-ghost { background: #efe7da; color: #424851; }
    button:hover { filter: brightness(1.02); transform: translateY(-1px); }

    .chips { display: flex; gap: 8px; flex-wrap: wrap; }

    .chip {
      border: 1px solid #c8b59a;
      background: #fffefb;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 0.83rem;
      color: #575e69;
      cursor: pointer;
    }

    .result { display: none; animation: rise 240ms ease-out; }
    .result.show { display: block; }

    @keyframes rise {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .result-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin: 0 0 12px;
    }

    .result h2 {
      margin: 0;
      font-size: 1.18rem;
      letter-spacing: 0.01em;
    }

    .btn-copy {
      background: #e8f4f4;
      color: #24595c;
      border: 1px solid #b8d3d3;
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
    }

    /*  SUMMARY BADGES  */
    .result-summary {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }

    .badge {
      background: linear-gradient(180deg, #fff 0%, #fffcf7 100%);
      border: 1px solid #d8ccb9;
      border-top: 3px solid #d8ccb9;
      border-radius: 10px;
      padding: 8px 12px;
      min-width: 120px;
      flex: 1 1 120px;
    }

    .badge .k {
      display: block;
      color: var(--muted);
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 3px;
      font-weight: 700;
    }

    .badge .v {
      font-weight: 700;
      font-size: 0.9rem;
      line-height: 1.25;
      word-break: normal;
      overflow-wrap: anywhere;
    }

    /* urgencia colorida */
    .badge[data-key="urgencia"] .v[data-val="OK"]      { color: var(--ok); }
    .badge[data-key="urgencia"] .v[data-val="ATENCAO"] { color: var(--warn); }
    .badge[data-key="urgencia"] .v[data-val="CRITICO"] { color: var(--danger); }
    .badge[data-key="urgencia"]                         { border-top-color: #d0e8e4; }
    .badge[data-key="status"]                           { border-top-color: #ead8bb; }
    .badge[data-key="recomendacao"]                     { border-top-color: #f1d6c3; }

    /* recomendacao colorida */
    .badge[data-key="recomendacao"] .v[data-val="MANTER"]    { color: var(--ok); }
    .badge[data-key="recomendacao"] .v[data-val="REVISAR"]   { color: var(--warn); }
    .badge[data-key="recomendacao"] .v[data-val="CORRIGIR"]  { color: var(--warn); }
    .badge[data-key="recomendacao"] .v[data-val="SUBSTITUIR"]{ color: var(--danger); }
    .badge[data-key="recomendacao"] .v[data-val="REMOVER"]   { color: var(--danger); }

    /*  RESULT GRID  */
    .result-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto auto;
      gap: 10px;
      margin-bottom: 12px;
    }

    /* Adequacao ocupa a coluna da direita em duas linhas */
    .result-card.adequacao {
      grid-column: 2;
      grid-row: 1 / span 2;
    }

    .result-card {
      position: relative;
      background: linear-gradient(180deg, #fff 0%, #fffdf9 100%);
      border: 1px solid #d9cdbb;
      border-radius: 12px;
      padding: 14px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.04);
    }

    .result-card::before {
      content: "";
      position: absolute;
      top: 10px;
      bottom: 10px;
      left: 0;
      width: 4px;
      border-radius: 0 6px 6px 0;
      background: linear-gradient(180deg, #0b7f87, #005f73);
      opacity: 0.75;
    }

    .result-card.adequacao::before {
      background: linear-gradient(180deg, #b35a00, #ca6702);
    }

    .result-card h3 {
      margin: 0 0 10px;
      font-size: 0.82rem;
      color: var(--brand);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 800;
      border-bottom: 1px solid #ece6dc;
      padding-bottom: 8px;
    }

    /*  KV TABLE  */
    .kv {
      display: grid;
      gap: 0;
      font-size: 0.85rem;
    }

    .kv-row {
      display: grid;
      grid-template-columns: 150px 1fr;
      gap: 8px;
      align-items: start;
      padding: 9px 0;
      border-bottom: 1px dashed #ece3d5;
    }

    .kv-row:nth-child(odd) {
      background: #fdf8ef;
      margin: 0 -6px;
      padding: 9px 6px;
      border-radius: 8px;
      border-bottom-color: transparent;
    }

    .kv-row:last-child {
      border-bottom: 0;
      padding-bottom: 2px;
    }

    .kv-row .key {
      color: var(--muted);
      font-size: 0.76rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      font-weight: 700;
      line-height: 1.2;
    }

    .kv-row .value {
      color: var(--text);
      line-height: 1.4;
      word-break: normal;
      overflow-wrap: anywhere;
      white-space: pre-wrap;
    }

    /* pills para valores de status */
    .pill {
      display: inline-block;
      border-radius: 999px;
      padding: 2px 9px;
      font-size: 0.78rem;
      font-weight: 700;
    }

    .pill-ok      { background: #d4f1ec; color: #1a6b5f; }
    .pill-warn    { background: #fde8cc; color: #8c4a02; }
    .pill-danger  { background: #fdddd6; color: #8a2500; }
    .pill-neutral { background: #eceef1; color: #424851; }

    /* flags como tags */
    .flag-list { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 2px; }

    .flag-tag {
      background: #fde8cc;
      color: #7c3d02;
      border-radius: 6px;
      padding: 2px 7px;
      font-size: 0.74rem;
      font-weight: 600;
    }

    details.raw-json {
      border: 1px solid #d8ccb9;
      border-radius: 12px;
      background: #f8f4ec;
      padding: 8px 10px;
    }

    details.raw-json > summary {
      cursor: pointer;
      color: #424851;
      font-weight: 700;
      font-size: 0.88rem;
    }

    .result pre {
      margin: 8px 0 0;
      background: #1f2937;
      color: #d9fce6;
      border-radius: 10px;
      padding: 14px;
      overflow: auto;
      white-space: pre-wrap;
      word-wrap: break-word;
      max-height: 460px;
      font-size: 0.82rem;
    }

    .meta {
      margin-top: 10px;
      font-size: 0.88rem;
      color: var(--muted);
      min-height: 1.2em;
    }

    .meta.error { color: var(--danger); }
    .meta.ok    { color: var(--ok); }
    .meta.warn  { color: var(--warn); }

    @media (max-width: 640px) {
      .hero, .card { padding: 14px; }
      .actions button { width: 100%; }
      .result-grid { grid-template-columns: 1fr; }
      .result-card.adequacao { grid-column: 1; grid-row: auto; }
      .kv-row { grid-template-columns: 1fr; gap: 4px; padding: 8px 0; }
      .result-head { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <h1>Verificador de Referencias Juridicas</h1>
      <p>Confere a existencia da referencia, analisa o conteudo citado e avalia a aderencia ao contexto da peticao.</p>
    </section>

    <section class="card">
      <div class="chips" aria-label="Casos rapidos">
        <button class="chip"
          data-ref="REsp 1.810.170/RS"
          data-ctx="Conforme entendimento pacificado no STJ, a cobranca de taxa de conveniencia e abusiva ao consumidor, como decidido no REsp 1.810.170/RS, razao pela qual deve ser reconhecida a ilegalidade da cobranca.">
          Caso STJ
        </button>
        <button class="chip"
          data-ref="0815641-45.2025.8.10.0040"
          data-ctx="No ambito deste Egregio Tribunal de Justica do Estado do Maranhao, cumpre citar o precedente firmado nos autos do processo n 0815641-45.2025.8.10.0040, que consolidou entendimento favoravel a tese ora defendida.">
          Caso CNJ
        </button>
        <button class="chip"
          data-ref="processo abc123 sem formato"
          data-ctx="A peticao cita este precedente para reforcar o pedido principal.">
          Caso invalido
        </button>
      </div>
    </section>

    <section class="card">
      <form id="verify-form" class="grid">
        <div>
          <label for="referencia">Referencia Juridica</label>
          <input id="referencia" name="referencia" placeholder="Ex: REsp 1.810.170/RS" required />
        </div>
        <div>
          <label for="contexto">Contexto da Peticao</label>
          <textarea id="contexto" name="contexto" placeholder="Cole o trecho da peticao..." required></textarea>
        </div>
        <div class="actions">
          <button type="submit" class="btn-primary" id="btn-submit">Verificar</button>
          <button type="button" class="btn-ghost" id="btn-clean">Limpar</button>
        </div>
      </form>
      <p id="meta" class="meta"></p>
    </section>

    <section id="result-wrap" class="card result">
      <div class="result-head">
        <h2>Resultado</h2>
        <button type="button" class="btn-copy" id="btn-copy-json">Copiar JSON</button>
      </div>
      <div class="result-summary" id="result-summary"></div>
      <div class="result-grid">
        <article class="result-card">
          <h3>Existencia</h3>
          <div class="kv" id="existencia-kv"></div>
        </article>
        <article class="result-card adequacao">
          <h3>Adequacao</h3>
          <div class="kv" id="adequacao-kv"></div>
        </article>
        <article class="result-card">
          <h3>Conteudo</h3>
          <div class="kv" id="conteudo-kv"></div>
        </article>
      </div>
      <details class="raw-json">
        <summary>JSON completo</summary>
        <pre id="result-json">{}</pre>
      </details>
    </section>
  </main>

  <script>
    const form        = document.getElementById("verify-form");
    const inputRef    = document.getElementById("referencia");
    const inputCtx    = document.getElementById("contexto");
    const resultWrap  = document.getElementById("result-wrap");
    const resultJson  = document.getElementById("result-json");
    const btnSubmit   = document.getElementById("btn-submit");
    const btnClean    = document.getElementById("btn-clean");
    const btnCopyJson = document.getElementById("btn-copy-json");
    const meta        = document.getElementById("meta");
    const resultSummary = document.getElementById("result-summary");
    const existenciaKv  = document.getElementById("existencia-kv");
    const conteudoKv    = document.getElementById("conteudo-kv");
    const adequacaoKv   = document.getElementById("adequacao-kv");

    function setMeta(text, mode = "") {
      meta.textContent = text;
      meta.className = "meta";
      if (mode) meta.classList.add(mode);
    }

    /*  helpers de cor  */
    const STATUS_CLASS = {
      EXISTE: "pill-ok",
      EXISTE_COM_DIVERGENCIA: "pill-warn",
      NAO_ENCONTRADO: "pill-danger",
      FORMATO_INVALIDO: "pill-danger",
      ADEQUADO: "pill-ok",
      PARCIALMENTE_ADEQUADO: "pill-warn",
      INADEQUADO: "pill-danger",
      UTIL: "pill-ok",
      PARCIALMENTE_UTIL: "pill-warn",
      INUTIL: "pill-danger",
      ALTO: "pill-ok",
      MEDIO: "pill-warn",
      BAIXO: "pill-warn",
      NULO: "pill-danger",
      INDETERMINADO: "pill-neutral",
    };

    const ENUM_KEYS = new Set([
      "status",
      "adequacao_tematica",
      "adequacao_dispositivo",
      "peso_precedencial",
      "recomendacao",
      "nivel_urgencia",
      "dispositivo"
    ]);

    function humanize(text) {
      return String(text).replaceAll("_", " ");
    }

    function pill(text) {
      if (!text) return "-";
      const cls = STATUS_CLASS[text] || "pill-neutral";
      return `<span class="pill ${cls}">${humanize(text)}</span>`;
    }

    const PILL_KEYS = new Set([
      "status","adequacao_tematica","adequacao_dispositivo","peso_precedencial"
    ]);
    const FLAG_KEYS = new Set(["flags"]);
    const URL_KEYS  = new Set(["url_fonte"]);

    function renderValue(key, value) {
      if (value === null || value === undefined) return "<span style='color:#aaa'>-</span>";

      if (FLAG_KEYS.has(key)) {
        if (!Array.isArray(value) || value.length === 0)
          return "<span style='color:#aaa'>nenhuma</span>";
        return `<div class="flag-list">${value.map(f => `<span class="flag-tag">${f}</span>`).join("")}</div>`;
      }

      if (URL_KEYS.has(key) && value) {
        return `<a href="${value}" target="_blank" rel="noopener" style="color:var(--brand-2);word-break:break-all">${value}</a>`;
      }

      if (PILL_KEYS.has(key)) return pill(String(value));

      if (Array.isArray(value)) return value.length ? value.join(" | ") : "-";
      if (typeof value === "object") return JSON.stringify(value);
      if (ENUM_KEYS.has(key) && typeof value === "string") return humanize(value);
      return String(value);
    }

    function renderKV(container, obj) {
      container.innerHTML = "";
      if (!obj || typeof obj !== "object") return;

      Object.entries(obj).forEach(([key, value]) => {
        const row = document.createElement("div");
        row.className = "kv-row";

        const keyDiv = document.createElement("div");
        keyDiv.className = "key";
        keyDiv.textContent = key.replace(/_/g, " ");

        const valueDiv = document.createElement("div");
        valueDiv.className = "value";
        valueDiv.innerHTML = renderValue(key, value);

        row.appendChild(keyDiv);
        row.appendChild(valueDiv);
        container.appendChild(row);
      });
    }

    function renderSummary(data) {
      const items = [
        ["referencia",  data?.referencia_normalizada],
        ["tribunal",    data?.tribunal_inferido],
        ["status",      data?.existencia?.status],
        ["recomendacao",data?.recomendacao],
        ["urgencia",    data?.nivel_urgencia],
      ];

      resultSummary.innerHTML = "";
      items.forEach(([k, v]) => {
        const badge = document.createElement("div");
        badge.className = "badge";
        badge.dataset.key = k;
        const rawVal = v != null ? String(v) : "-";
        const displayVal = rawVal === "-" ? "-" : humanize(rawVal);
        badge.innerHTML = `<span class="k">${k}</span><span class="v" data-val="${rawVal}">${displayVal}</span>`;
        resultSummary.appendChild(badge);
      });
    }

    function showResult(data) {
      renderSummary(data);
      renderKV(existenciaKv, data?.existencia || {});
      renderKV(conteudoKv,   data?.conteudo   || {});
      renderKV(adequacaoKv,  data?.adequacao  || {});
      resultJson.textContent = JSON.stringify(data, null, 2);
      resultWrap.classList.add("show");
    }

    btnCopyJson.addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(resultJson.textContent || "{}");
        setMeta("JSON copiado.", "ok");
      } catch (_) {
        setMeta("Nao foi possivel copiar o JSON.", "warn");
      }
    });

    const API_BASE = window.location.protocol === "file:" ? "http://localhost:8000" : "";

    async function submitForm(event) {
      event.preventDefault();
      setMeta("Consultando API...", "warn");
      btnSubmit.disabled = true;
      btnSubmit.textContent = "Verificando...";

      const payload = {
        referencia: inputRef.value.trim(),
        contexto:   inputCtx.value.trim()
      };

      try {
        const response = await fetch(`${API_BASE}/verificar`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        const isJson = response.headers.get("content-type")?.includes("application/json");
        const data = isJson ? await response.json() : { erro: await response.text() };
        showResult(data);

        if (!response.ok) {
          setMeta(`Erro ${response.status}: falha na verificacao`, "error");
          return;
        }
        setMeta("Verificacao concluida com sucesso.", "ok");
      } catch (error) {
        showResult({ erro: String(error) });
        setMeta("Falha de conexao com a API.", "error");
      } finally {
        btnSubmit.disabled = false;
        btnSubmit.textContent = "Verificar";
      }
    }

    form.addEventListener("submit", submitForm);

    btnClean.addEventListener("click", () => {
      form.reset();
      setMeta("");
      resultWrap.classList.remove("show");
      resultSummary.innerHTML = "";
      existenciaKv.innerHTML  = "";
      conteudoKv.innerHTML    = "";
      adequacaoKv.innerHTML   = "";
      resultJson.textContent  = "{}";
      inputRef.focus();
    });

    document.querySelectorAll(".chip").forEach((chip) => {
      chip.addEventListener("click", () => {
        inputRef.value = chip.dataset.ref || "";
        inputCtx.value = chip.dataset.ctx || "";
        setMeta("Caso preenchido. Clique em Verificar.", "warn");
      });
    });
  </script>
</body>
</html>
